<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Dark navy background with rounded corners -->
  <rect width="100" height="100" rx="20" fill="#0F1929"/>

  <!-- Antenna -->
  <line x1="50" y1="28" x2="50" y2="18" stroke="#06B6D4" stroke-width="3.5" stroke-linecap="round"/>
  <circle cx="50" cy="14" r="5" fill="#06B6D4"/>

  <!-- Robot head (rounded rect) -->
  <rect x="22" y="28" width="56" height="48" rx="10" fill="none" stroke="#06B6D4" stroke-width="4"/>

  <!-- Left eye -->
  <rect x="31" y="40" width="14" height="12" rx="3" fill="#06B6D4"/>

  <!-- Right eye -->
  <rect x="55" y="40" width="14" height="12" rx="3" fill="#06B6D4"/>

  <!-- Mouth (segmented grill) -->
  <rect x="32" y="61" width="8" height="7" rx="2" fill="#06B6D4"/>
  <rect x="46" y="61" width="8" height="7" rx="2" fill="#06B6D4"/>
  <rect x="60" y="61" width="8" height="7" rx="2" fill="#06B6D4"/>
</svg>
